name: Fast-coverage

on:
  workflow_run:
    workflows: [Test]
    types: [completed]

permissions:
  statuses: write

jobs:
  fast-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - run: uv sync --locked --no-dev --group github-actions
      - uses: actions/download-artifact@v8
        with:
          name: coverage-html
          path: htmlcov
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Upload coverage to Fast-coverage
        run: uv run python scripts/fast_cov.py htmlcov --commit-sha ${{ github.event.workflow_run.head_sha }}
        env:
          FAST_COV_REPO_OWNER: ${{ github.event.repository.owner.login }}
          FAST_COV_REPO_NAME: ${{ github.event.repository.name }}
          FAST_COV_API_KEY: ${{ secrets.FAST_COV_API_KEY }}
          FAST_COV_GH_TOKEN: ${{ secrets.FAST_COV_GH_TOKEN }}
          FAST_COV_THRESHOLD: 101
